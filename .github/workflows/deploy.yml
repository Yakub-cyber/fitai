name: Deploy web to GitHub Pages

# Собирает web/ и публикует на GitHub Pages при пуше в main.
# Перед первым запуском в репозитории задать:
#   Settings → Pages → Source: GitHub Actions
#   Settings → Secrets and variables → Actions → Variables → New:
#     VITE_API_URL = https://<ваш-бэкенд>.onrender.com   (URL API Gateway)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build web
        env:
          # Подпапка Pages: https://<user>.github.io/<repo>/  → base = /<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build -w web
      - name: SPA fallback для deep-links (обновление /workouts и т.п.)
        run: cp web/dist/index.html web/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
